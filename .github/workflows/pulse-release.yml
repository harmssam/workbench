name: Pulse Release

on:
  push:
    tags:
      - "pulse-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Toolchain info
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Test
        working-directory: apps/pulse
        run: |
          chmod +x build-app.sh scripts/generate-app-icon.sh
          rm -rf .build
          swift test

      - name: Build app bundle
        working-directory: apps/pulse
        run: ./build-app.sh

      - name: Package zip
        working-directory: apps/pulse
        run: |
          VERSION="${GITHUB_REF_NAME#pulse-v}"
          if [[ "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Sources/Pulse/Info.plist)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          ditto -c -k --sequesterRsrc --keepParent \
            dist/Pulse.app \
            "dist/Pulse-${VERSION}-macos-arm64.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Pulse ${{ env.VERSION }}
          files: apps/pulse/dist/Pulse-${{ env.VERSION }}-macos-arm64.zip
          generate_release_notes: true
          body: |
            ## Install

            1. Download `Pulse-${{ env.VERSION }}-macos-arm64.zip`
            2. Unzip and drag **Pulse.app** to Applications
            3. Open Pulse — if macOS blocks it, right-click → **Open** (first launch only)

            ## Requirements

            - macOS 14+
            - Apple Silicon (arm64)

            Built from tag `${{ github.ref_name }}`.